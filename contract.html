<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Kay and Kay Student Living</title>
    <style>
        body {
            font-family: Aptos,sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        .contact-container {
            max-width: 600px;
            margin:50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: blue;
            text-align: center;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid  #ccc;
            border-radius: 5px;
            box-sizing: border-box; /*Ensures padding doesn't break width */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover{
            background-color: blue;
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h2>Get In Touch</h2>
        <p style="text-align: center;">Have a question? Send us a message and we'll get back to you.</p>
        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name"required>
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="student@example.com"required>
            <label for="message">How can we help?</label>
            <textarea id="message" rows="5" placeholder="Tell us about your housing needs..."></textarea>
            <button type="submit">Sumbmit Inquiry</button>
        </form>
    </div>
</body>
</html>
